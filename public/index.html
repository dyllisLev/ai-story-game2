<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Story Game</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-panel: #161b22;
      --bg-input: #1c2128;
      --bg-card: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --cyan: #53d8fb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      color: var(--accent);
      font-weight: 800;
      font-size: 20px;
    }

    .logo-sub {
      color: var(--text-muted);
      font-size: 13px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--bg-input);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

    /* --- Main Content --- */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .story-count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* --- Story Grid --- */
    .story-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .story-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .story-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.1);
    }

    .story-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    .story-preview {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .story-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }

    .story-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--bg-dark);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
    }

    .story-tags {
      display: flex;
      gap: 6px;
    }

    .story-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(83, 216, 251, 0.1);
      color: var(--cyan);
    }

    .story-tag.locked {
      background: rgba(233, 69, 96, 0.1);
      color: var(--accent);
    }

    /* --- Empty State --- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* --- Loading --- */
    .loading-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .loading-state span {
      animation: pulse 1.5s infinite;
    }

    /* --- Session Section --- */
    .session-section {
      margin-top: 16px;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .session-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .session-item:hover { border-color: var(--cyan); }

    .session-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .session-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .session-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .session-resume {
      font-size: 12px;
      color: var(--cyan);
      font-weight: 600;
    }

    /* --- Light Theme --- */
    body.light-theme {
      --bg-dark: #ffffff;
      --bg-panel: #f6f8fa;
      --bg-input: #f0f2f5;
      --bg-card: #f0f2f5;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .header { padding: 16px; flex-wrap: wrap; gap: 12px; }
      .main { padding: 20px 16px; }
      .story-grid { grid-template-columns: 1fr; }
      .btn { min-height: 44px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">AI Story Game</span>
      <span class="logo-sub">AI 인터랙티브 소설</span>
    </div>
    <div class="header-actions">
      <a href="editor.html" class="btn btn-primary">+ 새 스토리 작성</a>
    </div>
  </div>

  <div class="main">
    <!-- Stories Section -->
    <div class="section-title">
      공개 스토리 <span class="story-count" id="storyCount"></span>
    </div>
    <div class="story-grid" id="storyGrid">
      <div class="loading-state"><span>스토리를 불러오는 중...</span></div>
    </div>

    <!-- Recent Sessions -->
    <div class="session-section" id="sessionSection" style="display:none;">
      <div class="section-title">내 플레이 기록</div>
      <div class="session-list" id="sessionList"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js';
    import { getFirestore, getDocs, collection, query, limit as firestoreLimit }
      from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAaO9dQmykNuiaf23jh_QJVJFBZn4HsMZw",
      authDomain: "ai-story-game-5278.firebaseapp.com",
      projectId: "ai-story-game-5278",
      storageBucket: "ai-story-game-5278.firebasestorage.app",
      messagingSenderId: "571520885404",
      appId: "1:571520885404:web:cfc13ab40dd9a81edc4359"
    };

    let db = null;
    try {
      if (FIREBASE_CONFIG.apiKey) {
        const app = initializeApp(FIREBASE_CONFIG);
        db = getFirestore(app);
      }
    } catch (e) {
      console.warn('Firebase init failed:', e);
    }

    const storyGrid = document.getElementById('storyGrid');
    const storyCount = document.getElementById('storyCount');

    // --- Load Stories from Firestore ---
    async function loadStories() {
      if (!db) {
        storyGrid.innerHTML = '<div class="empty-state"><div class="icon">&#9888;</div><p>Firebase가 설정되지 않았습니다.</p></div>';
        return;
      }

      try {
        const q = query(collection(db, 'stories'), firestoreLimit(50));
        const snap = await getDocs(q);
        const stories = [];
        snap.forEach(d => {
          stories.push({ id: d.id, ...d.data() });
        });

        // Sort by createdAt desc
        stories.sort((a, b) => {
          const ta = a.createdAt?.toMillis?.() || a.createdAt?.seconds * 1000 || 0;
          const tb = b.createdAt?.toMillis?.() || b.createdAt?.seconds * 1000 || 0;
          return tb - ta;
        });

        storyCount.textContent = `(${stories.length})`;

        if (stories.length === 0) {
          storyGrid.innerHTML = `
            <div class="empty-state">
              <div class="icon">&#128214;</div>
              <p>등록된 스토리가 없습니다.<br>첫 번째 스토리를 만들어 보세요!</p>
              <a href="editor.html" class="btn btn-primary">+ 새 스토리 작성</a>
            </div>`;
          return;
        }

        storyGrid.innerHTML = '';
        for (const story of stories) {
          const card = document.createElement('div');
          card.className = 'story-card';
          card.addEventListener('click', () => {
            window.location.href = `play.html?storyId=${story.id}`;
          });

          const preview = story.worldSetting || story.story || '';
          const previewClean = preview.replace(/[#\n\\n]/g, ' ').trim().slice(0, 150);

          const hasPassword = !!story.passwordHash;
          const createdDate = story.createdAt?.toDate?.()
            ? story.createdAt.toDate().toLocaleDateString('ko-KR')
            : '';

          card.innerHTML = `
            <div class="story-title">${escapeHtml(story.title || '제목 없음')}</div>
            <div class="story-preview">${escapeHtml(previewClean || '설명 없음')}</div>
            <div class="story-meta">
              <span class="story-id">${story.id.slice(0, 8)}...</span>
              <div class="story-tags">
                ${story.characterName ? `<span class="story-tag">${escapeHtml(story.characterName)}</span>` : ''}
                ${hasPassword ? '<span class="story-tag locked">&#128274; 암호</span>' : ''}
                ${createdDate ? `<span style="font-size:10px;color:var(--text-muted);">${createdDate}</span>` : ''}
              </div>
            </div>`;

          storyGrid.appendChild(card);
        }
      } catch (e) {
        console.error('Story load failed:', e);
        storyGrid.innerHTML = '<div class="empty-state"><div class="icon">&#9888;</div><p>스토리 로드에 실패했습니다.</p></div>';
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // --- Load Recent Sessions from localStorage ---
    function loadSessions() {
      const SESSION_LIST_KEY = 'ai-story-game-sessions';
      try {
        const list = JSON.parse(localStorage.getItem(SESSION_LIST_KEY) || '[]');
        if (list.length === 0) return;

        const section = document.getElementById('sessionSection');
        const container = document.getElementById('sessionList');
        section.style.display = 'block';

        for (const s of list.slice(0, 10)) {
          const item = document.createElement('div');
          item.className = 'session-item';
          item.addEventListener('click', () => {
            window.location.href = `play.html?sessionId=${s.sessionId}`;
          });

          const time = new Date(s.lastPlayedAt).toLocaleString('ko-KR');

          item.innerHTML = `
            <div class="session-info">
              <span class="session-title">${escapeHtml(s.title || '제목 없음')}</span>
              <span class="session-time">${time}</span>
            </div>
            <span class="session-resume">이어하기 &rarr;</span>`;

          container.appendChild(item);
        }
      } catch (e) {}
    }

    // --- Theme (shared with play.html via localStorage) ---
    function applyTheme(theme) {
      document.body.classList.remove('light-theme');
      if (theme === 'light') {
        document.body.classList.add('light-theme');
      } else if (theme === 'system') {
        if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.body.classList.add('light-theme');
        }
      }
    }
    applyTheme(localStorage.getItem('ai-story-game-theme') || 'system');
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
      if (localStorage.getItem('ai-story-game-theme') === 'system') applyTheme('system');
    });

    // --- Init ---
    loadStories();
    loadSessions();
  </script>
</body>
</html>
