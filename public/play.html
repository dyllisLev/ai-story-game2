<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Story Game - Play</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.38/dist/katex.min.css" crossorigin="anonymous">
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-panel: #161b22;
      --bg-input: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --cyan: #53d8fb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- Top Bar --- */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .top-bar .logo {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      margin-right: 4px;
    }

    .top-bar .spacer { flex: 1; }

    .top-bar .settings-name {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .token-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .token-bar #costInfo { color: #2ea043; }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: var(--bg-input);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--text-muted); }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .checkbox-group input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .cache-status {
      font-size: 11px;
      color: var(--text-muted);
    }
    .cache-status.active { color: #2ea043; }

    /* --- Main Content --- */
    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* --- Game Area --- */
    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 24px;
      overflow: hidden;
    }

    /* --- Right Side Panel --- */
    .side-panel {
      width: 280px;
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      flex-shrink: 0;
      overflow-y: auto;
      transition: margin-right 0.25s ease;
    }

    .side-panel.collapsed {
      margin-right: -280px;
    }

    .side-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .side-panel-header span {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .side-panel-header button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      line-height: 1;
    }
    .side-panel-header button:hover { color: var(--text); }

    .side-panel-section {
      padding: 16px;
    }

    .side-panel-section-title {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .side-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background 0.15s;
    }
    .side-menu-item:hover { background: var(--bg-input); }

    .side-menu-item .menu-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .side-menu-item .menu-label { flex: 1; }

    .side-menu-item .menu-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .side-menu-item .menu-badge.set {
      background: rgba(233, 69, 96, 0.15);
      color: var(--accent);
    }
    .side-menu-item .menu-badge.empty {
      background: var(--bg-input);
      color: var(--text-muted);
    }

    .side-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 16px;
    }

    /* --- Modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 520px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 20px;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .modal-body .desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .modal-body input[type="text"],
    .modal-body textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
    }
    .modal-body input:focus,
    .modal-body textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-body textarea { min-height: 200px; }

    .modal-body .field-group { margin-bottom: 16px; }
    .modal-body .field-group:last-child { margin-bottom: 0; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }

    .modal-footer .btn { padding: 8px 20px; font-size: 13px; }

    .game-output {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
      font-size: 14px;
      line-height: 1.8;
    }

    .game-placeholder {
      color: var(--text-muted);
      text-align: center;
      margin-top: 30vh;
    }

    .game-placeholder .hint {
      font-size: 12px;
      margin-top: 8px;
    }

    .game-text {
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .game-text.narrator { color: var(--text); }
    .game-text.narrator.markdown-rendered { white-space: normal; }

    .game-text h1, .game-text h2, .game-text h3 {
      margin: 12px 0 6px;
      color: var(--cyan);
    }
    .game-text h1 { font-size: 18px; }
    .game-text h2 { font-size: 16px; }
    .game-text h3 { font-size: 14px; }

    .game-text strong { color: var(--accent); font-weight: 700; }
    .game-text em { color: var(--text-muted); font-style: italic; }

    .game-text code {
      background: var(--bg-input);
      padding: 2px 5px;
      border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
    }

    .game-text pre {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
      white-space: pre-wrap;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .game-text pre code { background: none; padding: 0; }

    .game-text ul, .game-text ol {
      margin: 6px 0;
      padding-left: 20px;
    }
    .game-text li { margin: 2px 0; }

    .game-text hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .game-text p { margin: 0 0 0.5em; }
    .game-text p:last-child { margin-bottom: 0; }

    .game-text blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--text-muted);
    }

    .game-text table {
      border-collapse: collapse;
      margin: 8px 0;
      width: 100%;
    }

    .game-text th, .game-text td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
      font-size: 13px;
    }

    .game-text th {
      background: var(--bg-input);
      color: var(--cyan);
    }

    .game-text.user-action {
      color: var(--cyan);
      padding-left: 12px;
      border-left: 2px solid var(--cyan);
    }

    .game-text .katex { font-size: 1.1em; }
    .game-text .katex-display { margin: 8px 0; }

    .game-input-area {
      display: flex;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-top: 12px;
      flex-shrink: 0;
    }

    .game-input-area input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }

    .game-input-area input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .game-input-area .btn {
      padding: 10px 20px;
      font-size: 13px;
    }

    .loading::after {
      content: '⏳ 생성 중...';
      display: block;
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 8px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* --- Save Status --- */
    .save-status {
      display: flex; align-items: center; gap: 6px; font-size: 11px; white-space: nowrap;
    }
    .save-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .save-dot.unsaved { background: var(--text-muted); }
    .save-dot.saving { background: #d29922; animation: pulse 1s infinite; }
    .save-dot.saved { background: #2ea043; }
    .save-dot.error { background: var(--accent); }
    .save-dot.offline { background: #d29922; }
    .save-text { color: var(--text-muted); }

    .btn-save-cloud {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; white-space: nowrap;
    }
    .btn-save-cloud:hover { color: var(--text); border-color: var(--text-muted); }
    .btn-save-cloud:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- Session Info Bar (minimal, below top bar) --- */
    .session-info-bar {
      display: flex; align-items: center; gap: 8px; padding: 4px 16px;
      background: var(--bg-panel); border-bottom: 1px solid var(--border);
      flex-shrink: 0; font-size: 12px;
    }

    .session-id-display {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--text-muted);
      cursor: pointer; padding: 4px 8px; background: var(--bg-input); border-radius: 4px;
      border: 1px solid var(--border);
    }
    .session-id-display:hover { color: var(--text); border-color: var(--text-muted); }

    .turn-count { font-size: 11px; color: var(--text-muted); }
    .turn-count.warning { color: #d29922; }
    .turn-count.danger { color: var(--accent); }

    /* --- Theme --- */
    .theme-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .theme-btn.active { border-color: var(--accent); color: var(--accent); }

    /* --- Light Theme --- */
    body.light-theme {
      --bg-dark: #ffffff;
      --bg-panel: #f6f8fa;
      --bg-input: #f0f2f5;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      /* Top bar: compact, no overflow */
      .top-bar {
        gap: 6px;
        padding: 8px 10px;
        flex-wrap: nowrap;
        overflow-x: auto;
      }
      .top-bar .logo { font-size: 12px; margin-right: 0; }
      .top-bar .settings-name { display: none; }
      .top-bar .spacer { flex: 0; min-width: 0; }
      .token-bar { gap: 6px; font-size: 10px; }
      .token-bar #tokenInfo { display: none; }
      .btn { min-height: 36px; padding: 8px 12px; font-size: 12px; }
      .btn-icon { min-width: 36px; min-height: 36px; font-size: 14px; }

      /* Game area: fill screen, input pinned to bottom */
      .main-content { flex: 1; overflow: hidden; }
      .game-area {
        padding: 12px 12px;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .game-output { flex: 1; overflow-y: auto; }
      .game-input-area {
        flex-shrink: 0;
        padding-top: 8px;
        margin-top: 8px;
      }
      .game-input-area input { font-size: 16px; }

      /* Side panel: full overlay */
      .side-panel { position: fixed; right: 0; top: 0; bottom: 0; z-index: 50; width: 280px; }
      .side-panel.collapsed { transform: translateX(100%); margin-right: 0; }

      .side-menu-item { padding: 14px 12px; }
      .modal { max-width: 95vw; max-height: 90vh; }
    }

    /* --- Focus Mode --- */
    body.focus-mode .top-bar { display: none; }
    body.focus-mode .session-info-bar { display: none; }
    body.focus-mode .game-area { padding: 24px 15vw; }
    body.focus-mode .side-panel { display: none; }

    .focus-exit {
      display: none;
      position: fixed; top: 12px; right: 12px; z-index: 100;
    }
    body.focus-mode .focus-exit { display: block; }

    @media (max-width: 768px) {
      body.focus-mode .game-area { padding: 16px; }
    }
  </style>
</head>
<body>
  <button class="btn-icon focus-exit" id="btnExitFocus" title="집중 모드 해제">&#10005;</button>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.38/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Top Bar -->
  <div class="top-bar">
    <span class="logo">AI Story Game</span>
    <span class="settings-name" id="settingsName"></span>
    <div class="save-status" id="saveStatus" style="display:none;">
      <span class="save-dot unsaved" id="saveDot"></span>
      <span class="save-text" id="saveText">저장안됨</span>
    </div>
    <button class="btn-save-cloud" id="btnSaveCloud" style="display:none;" title="클라우드에 저장">저장</button>
    <div class="spacer"></div>
    <div class="token-bar">
      <span id="tokenInfo">토큰: 0</span>
      <span id="costInfo">$0.000000</span>
    </div>
    <button id="btnStart" class="btn btn-primary">게임 시작</button>
    <a href="index.html" class="btn btn-secondary" title="메인으로">홈</a>
    <button id="btnFocusMode" class="btn-icon" title="집중 모드">&#128065;</button>
    <button id="btnTogglePanel" class="btn-icon" title="플레이 설정">&#9776;</button>
  </div>

  <!-- Session info in top area (minimal) -->
  <div class="session-info-bar" id="sessionInfoBar" style="display:none;">
    <span class="session-id-display" id="sessionIdDisplay"></span>
    <span class="turn-count" id="turnCount"></span>
    <button class="btn-icon" id="btnDeleteSession" style="font-size:11px;padding:4px 8px;color:var(--accent);" title="세션 삭제">삭제</button>
  </div>

  <div class="main-content">
    <!-- Game Area -->
    <div class="game-area">
      <div class="game-output" id="gameOutput">
        <p class="game-placeholder">
          게임을 시작하려면 ☰ 메뉴에서 API Key를 설정하고 "게임 시작" 버튼을 누르세요.
        </p>
      </div>
      <div class="game-input-area">
        <input type="text" id="gameInput" placeholder="행동을 입력하세요..." disabled>
        <button id="btnSend" class="btn btn-primary" disabled>전송</button>
      </div>
    </div>

    <!-- Right Side Panel -->
    <div class="side-panel collapsed" id="sidePanel">
      <div class="side-panel-header">
        <span>플레이 설정</span>
        <button id="btnClosePanel">&times;</button>
      </div>
      <div class="side-panel-section">
        <div class="side-panel-section-title">스토리 / 세션</div>
        <div style="padding:4px 12px;display:flex;flex-direction:column;gap:8px;">
          <select id="storySelect" style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;">
            <option value="">스토리 선택...</option>
          </select>
          <select id="sessionSelect" style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;">
            <option value="">새 게임 또는 세션 선택...</option>
          </select>
          <div style="display:flex;gap:6px;">
            <input type="text" id="sessionIdInput" placeholder="세션 ID 입력" style="flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:12px;font-family:inherit;">
            <button class="btn-icon" id="btnLoadSession" style="font-size:12px;padding:8px 12px;">불러오기</button>
          </div>
        </div>
      </div>
      <div class="side-divider"></div>
      <div class="side-panel-section">
        <div class="side-panel-section-title">캐릭터</div>
        <div class="side-menu-item" id="menuCharacter">
          <span class="menu-icon">&#128100;</span>
          <span class="menu-label">주인공 프로필</span>
          <span class="menu-badge empty" id="badgeCharacter">미설정</span>
        </div>
        <div class="side-menu-item" id="menuUserNote">
          <span class="menu-icon">&#128221;</span>
          <span class="menu-label">유저 노트</span>
          <span class="menu-badge empty" id="badgeUserNote">미설정</span>
        </div>
        <div class="side-menu-item" id="menuSummary">
          <span class="menu-icon">&#128221;</span>
          <span class="menu-label">이야기 요약</span>
          <span class="menu-badge empty" id="badgeSummary">없음</span>
        </div>
      </div>
      <div class="side-divider"></div>
      <div class="side-panel-section">
        <div class="side-panel-section-title">폰트 크기</div>
        <div style="display:flex;align-items:center;gap:12px;padding:4px 12px;">
          <button class="btn-icon" id="btnFontDec" style="width:32px;height:32px;border-radius:50%;font-size:16px;">-</button>
          <span id="fontSizeDisplay" style="font-size:15px;font-weight:600;min-width:24px;text-align:center;">14</span>
          <button class="btn-icon" id="btnFontInc" style="width:32px;height:32px;border-radius:50%;font-size:16px;">+</button>
        </div>
      </div>
      <div class="side-divider"></div>
      <div class="side-panel-section">
        <div class="side-panel-section-title">API 설정</div>
        <div style="padding:4px 12px;display:flex;flex-direction:column;gap:8px;">
          <input type="password" id="apiKey" placeholder="Gemini API Key" style="width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;">

  <script type="module">
    // --- Firebase ---
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc, updateDoc, getDocs, collection, query, limit as firestoreLimit, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAaO9dQmykNuiaf23jh_QJVJFBZn4HsMZw",
      authDomain: "ai-story-game-5278.firebaseapp.com",
      projectId: "ai-story-game-5278",
      storageBucket: "ai-story-game-5278.firebasestorage.app",
      messagingSenderId: "571520885404",
      appId: "1:571520885404:web:cfc13ab40dd9a81edc4359"
    };

    let db = null;
    try {
      if (FIREBASE_CONFIG.apiKey) {
        const app = initializeApp(FIREBASE_CONFIG);
        db = getFirestore(app);
      }
    } catch (e) {
      console.warn('Firebase init failed:', e);
    }

    // --- DOM References ---
    const $ = id => document.getElementById(id);

    const els = {
      apiKey: $('apiKey'),
      modelSelect: $('modelSelect'),
      gameOutput: $('gameOutput'),
      gameInput: $('gameInput'),
      btnStart: $('btnStart'),
      btnSend: $('btnSend'),
      btnLoadSettings: $('btnLoadSettings'),
      fileInput: $('fileInput'),
      useLatex: $('useLatex'),
      useCache: $('useCache'),
      cacheStatus: $('cacheStatus'),
      tokenInfo: $('tokenInfo'),
      costInfo: $('costInfo'),
      settingsName: $('settingsName'),
      sidePanel: $('sidePanel'),
      badgeCharacter: $('badgeCharacter'),
      badgeUserNote: $('badgeUserNote'),
      fontSizeDisplay: $('fontSizeDisplay'),
    };

    // --- Session Management ---
    const SESSION_LIST_KEY = 'ai-story-game-sessions';
    const SESSION_DATA_PREFIX = 'ai-story-session-';
    const MAX_SESSION_LIST = 50;

    let currentSessionId = null;
    let currentStoryId = null;
    let storySummary = '';
    let summaryUpToIndex = 0;
    const SLIDING_WINDOW_SIZE = 20;
    let isDirty = false;
    let saveStatus = 'idle';
    let autoSaveInterval = null;

    // Stub — replaced with full implementation later in this file
    let renderSaveStatus = () => {};

    function getSessionList() {
      try { return JSON.parse(localStorage.getItem(SESSION_LIST_KEY) || '[]'); }
      catch { return []; }
    }

    function saveSessionList(list) {
      if (list.length > MAX_SESSION_LIST) {
        list.sort((a, b) => b.lastPlayedAt - a.lastPlayedAt);
        list = list.slice(0, MAX_SESSION_LIST);
      }
      localStorage.setItem(SESSION_LIST_KEY, JSON.stringify(list));
    }

    function addToSessionList(sessionId, title) {
      const list = getSessionList();
      const existing = list.findIndex(s => s.sessionId === sessionId);
      const entry = { sessionId, title: title || '제목 없음', lastPlayedAt: Date.now() };
      if (existing >= 0) list[existing] = entry;
      else list.unshift(entry);
      saveSessionList(list);
    }

    function removeFromSessionList(sessionId) {
      saveSessionList(getSessionList().filter(s => s.sessionId !== sessionId));
    }

    function saveSessionToLocal(sessionId, data) {
      localStorage.setItem(SESSION_DATA_PREFIX + sessionId, JSON.stringify(data));
    }

    function loadSessionFromLocal(sessionId) {
      try { return JSON.parse(localStorage.getItem(SESSION_DATA_PREFIX + sessionId)); }
      catch { return null; }
    }

    function removeSessionFromLocal(sessionId) {
      localStorage.removeItem(SESSION_DATA_PREFIX + sessionId);
    }

    function messagesToStorage(history) {
      return history.map(msg => ({
        role: msg.role,
        content: msg.parts[0].text,
        timestamp: msg._timestamp || Date.now()
      }));
    }

    function messagesFromStorage(stored) {
      return stored.map(msg => ({
        role: msg.role,
        parts: [{ text: msg.content }],
        _timestamp: msg.timestamp
      }));
    }

    async function generateSummary() {
      const apiKey = els.apiKey.value.trim();
      const model = els.modelSelect.value;
      if (!apiKey || !model) return;

      const windowStart = Math.max(0, conversationHistory.length - SLIDING_WINDOW_SIZE);
      if (windowStart <= summaryUpToIndex) return;

      const toSummarize = conversationHistory.slice(summaryUpToIndex, windowStart);
      if (toSummarize.length === 0) return;

      const summaryPrompt = storySummary
        ? `기존 요약:\n${storySummary}\n\n아래 새로운 대화를 기존 요약에 통합하여 업데이트해주세요.`
        : '아래 대화 내용을 핵심 줄거리, 중요 사건, 캐릭터 상태 변화 중심으로 요약해주세요.';

      const messages = toSummarize.map(m => `${m.role === 'user' ? '사용자' : 'AI'}: ${m.parts[0].text}`).join('\n\n');

      try {
        const res = await fetch(
          `${GEMINI_BASE}/models/${model}:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ role: 'user', parts: [{ text: `${summaryPrompt}\n\n---\n${messages}` }] }],
              systemInstruction: { parts: [{ text: '당신은 이야기 요약 전문가입니다. 핵심 줄거리, 캐릭터 상태, 중요 사건을 간결하게 요약하세요. 500자 이내.' }] },
            }),
          }
        );
        if (!res.ok) throw new Error(`API ${res.status}`);
        const data = await res.json();
        storySummary = data.candidates?.[0]?.content?.parts?.[0]?.text || storySummary;
        summaryUpToIndex = windowStart;
        updateSummaryBadge();
        markDirty();
      } catch (e) {
        console.error('Summary generation failed:', e);
      }
    }

    function buildSessionDocument() {
      return {
        storyId: currentStoryId || null,
        title: settingsData.title || '제목 없음',
        preset: {
          worldSetting: settingsData.worldSetting || '',
          story: settingsData.story || '',
          characterName: settingsData.characterName || '',
          characterSetting: settingsData.characterSetting || '',
          characters: settingsData.characters || '',
          userNote: settingsData.userNote || '',
          systemRules: settingsData.systemRules || '',
          useLatex: els.useLatex.checked,
          useCache: els.useCache.checked,
        },
        messages: messagesToStorage(conversationHistory),
        model: els.modelSelect.value || '',
        summary: storySummary || '',
        summaryUpToIndex: summaryUpToIndex || 0,
        updatedAt: serverTimestamp(),
        lastPlayedAt: serverTimestamp(),
      };
    }

    async function createSessionInFirestore(sessionId) {
      if (!db) return false;
      try {
        await setDoc(doc(db, 'sessions', sessionId), {
          ...buildSessionDocument(),
          createdAt: serverTimestamp(),
          ttl: null,
        });
        return true;
      } catch (e) { console.error('Firestore create failed:', e); return false; }
    }

    async function updateSessionInFirestore(sessionId) {
      if (!db || !sessionId) return false;
      try {
        await updateDoc(doc(db, 'sessions', sessionId), buildSessionDocument());
        return true;
      } catch (e) { console.error('Firestore update failed:', e); return false; }
    }

    async function loadSessionFromFirestore(sessionId) {
      if (!db) return null;
      try {
        const snap = await getDoc(doc(db, 'sessions', sessionId));
        return snap.exists() ? snap.data() : null;
      } catch (e) { console.error('Firestore load failed:', e); return null; }
    }

    function updateSaveStatus(status) {
      saveStatus = status;
      renderSaveStatus();
    }

    async function saveToCloud() {
      if (!currentSessionId || !isDirty) return;
      if (!navigator.onLine) { updateSaveStatus('offline'); return; }
      updateSaveStatus('saving');
      const localData = { ...buildSessionDocument(), updatedAt: Date.now(), lastPlayedAt: Date.now() };
      saveSessionToLocal(currentSessionId, localData);
      addToSessionList(currentSessionId, localData.title);
      const ok = await updateSessionInFirestore(currentSessionId);
      if (ok) { isDirty = false; updateSaveStatus('saved'); }
      else { updateSaveStatus('error'); }
    }

    function markDirty() {
      isDirty = true;
      updateSaveStatus('unsaved');
      if (currentSessionId) {
        const localData = { ...buildSessionDocument(), updatedAt: Date.now(), lastPlayedAt: Date.now() };
        saveSessionToLocal(currentSessionId, localData);
        addToSessionList(currentSessionId, localData.title);
      }
    }

    // --- Save Triggers ---
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden' && isDirty && currentSessionId) saveToCloud();
    });

    window.addEventListener('pagehide', () => {
      if (!isDirty || !currentSessionId || !FIREBASE_CONFIG.projectId) return;
      const now = new Date().toISOString();
      fetch(
        `https://firestore.googleapis.com/v1/projects/${FIREBASE_CONFIG.projectId}/databases/(default)/documents/sessions/${currentSessionId}?updateMask.fieldPaths=updatedAt&updateMask.fieldPaths=lastPlayedAt`,
        {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: {
            updatedAt: { timestampValue: now },
            lastPlayedAt: { timestampValue: now },
          }}),
          keepalive: true,
        }
      ).catch(() => {});
    });

    function startAutoSave() {
      stopAutoSave();
      autoSaveInterval = setInterval(() => {
        if (isDirty && currentSessionId) saveToCloud();
      }, 5 * 60 * 1000);
    }

    function stopAutoSave() {
      if (autoSaveInterval) { clearInterval(autoSaveInterval); autoSaveInterval = null; }
    }

    window.addEventListener('online', () => { if (isDirty && currentSessionId) saveToCloud(); });
    window.addEventListener('offline', () => { if (currentSessionId) updateSaveStatus('offline'); });

    // --- Settings Data (loaded from file or localStorage) ---
    let settingsData = {
      title: '',
      worldSetting: '',
      story: '',
      characterName: '',
      characterSetting: '',
      characters: '',
      userNote: '',
      systemRules: '',
    };

    // --- Token & Cost Tracking ---
    const MODEL_PRICING = {
      'gemini-3.1-pro':        [2.00, 12.00],
      'gemini-3.1-flash-lite': [0.25, 1.50],
      'gemini-3-flash':        [0.50, 3.00],
      'gemini-2.5-pro':        [1.25, 10.00],
      'gemini-2.5-flash-lite': [0.10, 0.40],
      'gemini-2.5-flash':      [0.30, 2.50],
      'gemini-2.0-flash-lite': [0.075, 0.30],
      'gemini-2.0-flash':      [0.10, 0.40],
      'gemini-1.5-pro':        [1.25, 5.00],
      'gemini-1.5-flash-8b':   [0.0375, 0.15],
      'gemini-1.5-flash':      [0.075, 0.30],
    };

    let totalInputTokens = 0;
    let totalOutputTokens = 0;
    let totalCost = 0;

    function getModelPricing(modelId) {
      for (const key of Object.keys(MODEL_PRICING)) {
        if (modelId.startsWith(key)) return MODEL_PRICING[key];
      }
      return null;
    }

    function updateTokenDisplay(usageMetadata) {
      if (!usageMetadata) return;
      const promptTokens = usageMetadata.promptTokenCount || 0;
      const candidateTokens = usageMetadata.candidatesTokenCount || 0;

      totalInputTokens += promptTokens;
      totalOutputTokens += candidateTokens;

      const modelId = els.modelSelect.value;
      const pricing = getModelPricing(modelId);
      if (pricing) {
        totalCost += (promptTokens / 1_000_000) * pricing[0]
                   + (candidateTokens / 1_000_000) * pricing[1];
      }

      const totalTokens = totalInputTokens + totalOutputTokens;
      els.tokenInfo.textContent = `토큰: ${totalTokens.toLocaleString()} (↑${totalInputTokens.toLocaleString()} ↓${totalOutputTokens.toLocaleString()})`;
      els.costInfo.textContent = pricing
        ? `$${totalCost.toFixed(6)}`
        : `$-.-- (가격 정보 없음)`;
    }

    function resetTokens() {
      totalInputTokens = 0;
      totalOutputTokens = 0;
      totalCost = 0;
      els.tokenInfo.textContent = '토큰: 0';
      els.costInfo.textContent = '$0.000000';
    }

    // --- Prompt Builder ---
    function buildPrompt() {
      const w = settingsData.worldSetting || '';
      const s = settingsData.story || '';
      const cn = settingsData.characterName || '';
      const cs = settingsData.characterSetting || '';
      const ch = settingsData.characters || '';
      const un = settingsData.userNote || '';
      const sr = settingsData.systemRules || '';

      let prompt = `당신은 인터랙티브 소설 게임의 AI 스토리텔러입니다.
아래 설정을 기반으로 몰입감 있는 소설을 진행하세요.

사용자가 행동을 입력하면 그에 따라 이야기를 이어가세요.
각 응답은 소설체로 작성하세요.`;

      if (sr) prompt += `\n\n[시스템 규칙]\n${sr}`;
      if (w) prompt += `\n\n[세계관]\n${w}`;
      if (s) prompt += `\n\n[스토리]\n${s}`;
      if (ch) prompt += `\n\n[등장인물]\n${ch}`;
      if (cn || cs) {
        prompt += `\n\n[주인공]`;
        if (cn) prompt += `\n이름: ${cn}`;
        if (cs) prompt += `\n설정: ${cs}`;
      }
      if (un) prompt += `\n\n[유저노트]\n${un}`;

      if (els.useLatex.checked) {
        prompt += `\n\n[LaTeX 연출 규칙]
대사와 효과음에 LaTeX 수식 문법을 사용하여 시각적으로 연출하세요.
반드시 $ 기호로 감싸서 인라인 수식으로 작성합니다.

■ 대사 작성 형식:
발화자 이름과 대사를 반드시 하나의 $ 안에 함께 포함하세요.
형식: $\\text{발화자: }\\textsf{\\textbf{"대사 내용"}}$
잘못된 예: 사내 $\\textsf{\\textbf{"대사"}}$ (발화자가 $ 밖에 있음 ✗)
올바른 예: $\\text{사내: }\\textsf{\\textbf{"대사"}}$ (발화자가 $ 안에 있음 ✓)

■ 대사 감정 연출:
- 일반 대사: $\\text{이름: }\\textsf{\\textbf{"대사 내용"}}$
- 귓속말/속삭임: $\\text{이름: }\\color{gray}\\small\\textsf{\\textbf{"속삭이는 내용"}}$
- 외침/비명: $\\text{이름: }\\huge\\textsf{\\textbf{"외치는 내용!"}}$
- 분노/격앙: $\\text{이름: }\\large\\color{red}\\textsf{\\textbf{"분노하는 내용!"}}$
- 부끄러움/유혹: $\\text{이름: }\\color{lightpink}\\textsf{\\textbf{"부끄러운 내용"}}$
- 슬픔/비탄: $\\text{이름: }\\color{SteelBlue}\\textsf{\\textbf{"슬픈 내용..."}}$
- 냉소/조롱: $\\text{이름: }\\color{darkviolet}\\textit{\\textsf{"냉소적인 내용"}}$
- 위압/경고: $\\text{이름: }\\Large\\color{darkred}\\textsf{\\textbf{"위압적인 내용"}}$
- 신비/예언: $\\text{이름: }\\color{gold}\\mathcal{\\text{신비로운 내용}}$

■ 효과 연출:
- 효과음/환경음: $\\colorbox{black}{\\color{cyan}\\small\\text{효과음}}$
- 시스템/알림: $\\fcolorbox{gray}{black}{\\color{lime}\\footnotesize\\text{시스템 메시지}}$
- 취소선(부정/철회): $\\cancel{\\text{취소된 내용}}$
- 강조/각성: $\\boxed{\\color{orange}\\textbf{\\text{강조 내용}}}$

■ 주의사항 (매우 중요 - 반드시 준수):
- 모든 LaTeX 표현은 반드시 $ 기호로 열고 닫아야 합니다. $가 없으면 렌더링되지 않습니다!
- 잘못된 예: \\text{이름: }\\textsf{\\textbf{"대사"}} ($ 없음 ✗)
- 올바른 예: $\\text{이름: }\\textsf{\\textbf{"대사"}}$ ($ 있음 ✓)
- 발화자 이름은 반드시 $ 안에 \\text{이름: } 형태로 포함하세요.
- HTML 태그나 &quot; 같은 HTML 엔티티는 절대 사용하지 마세요. 따옴표는 그냥 "를 쓰세요.
- 지문/나레이션은 LaTeX 없이 일반 텍스트로 작성하세요.
- 대사에만 LaTeX를 적용하세요. 남용하지 마세요.`;
      }

      if (cn) prompt = prompt.replaceAll('{{user}}', cn);

      return prompt;
    }

    // --- Settings Load ---
    const STORAGE_KEY = 'ai-story-game-settings';

    function applySettings(data, source) {
      if (data.apiKey) els.apiKey.value = data.apiKey;
      if ('useLatex' in data) els.useLatex.checked = !!data.useLatex;
      if ('useCache' in data) els.useCache.checked = !!data.useCache;

      settingsData.title = data.title || '';
      settingsData.worldSetting = data.worldSetting || '';
      settingsData.story = data.story || '';
      settingsData.characterName = data.characterName || '';
      settingsData.characterSetting = data.characterSetting || '';
      settingsData.characters = data.characters || '';
      settingsData.userNote = data.userNote || '';
      settingsData.systemRules = data.systemRules || '';

      // Update displayed preset name
      if (source === 'file') {
        // file name is set by the caller
      } else if (settingsData.title) {
        els.settingsName.textContent = settingsData.title;
      }

      // Restore model after models are fetched
      if (data.model) settingsData._pendingModel = data.model;

      // Update badges if already initialized

    // --- Markdown Parser ---
    marked.setOptions({ breaks: true, gfm: true });

    function renderMarkdown(text) {
      const placeholders = [];
      let processed = text;

      processed = processed.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
        const id = `%%LATEX_${placeholders.length}%%`;
        try {
          placeholders.push(katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false, trust: true }));
        } catch (e) { placeholders.push(`<code>${tex}</code>`); }
        return id;
      });

      processed = processed.replace(/\$([^\$\n]+?)\$/g, (_, tex) => {
        const id = `%%LATEX_${placeholders.length}%%`;
        try {
          placeholders.push(katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false, trust: true }));
        } catch (e) { placeholders.push(`<code>${tex}</code>`); }
        return id;
      });

      let html = marked.parse(processed);
      html = html.replace(/%%LATEX_(\d+)%%/g, (_, i) => placeholders[+i]);
      return html;
    }

    }

    async function sendToGemini(userMessage) {
      const apiKey = els.apiKey.value.trim();
      const model = els.modelSelect.value;

      if (!apiKey || !model) {
        alert('API Key와 모델을 선택해주세요.');
        return;
      }

      if (conversationHistory.length >= 500) {
        alert('이 세션은 메시지 한도(500)에 도달했습니다. 새 게임을 시작해주세요.');
        return;
      }

      isGenerating = true;
      els.gameInput.disabled = true;
      els.btnSend.disabled = true;
      els.btnStart.disabled = true;

      conversationHistory.push({ role: 'user', parts: [{ text: userMessage }] });
      markDirty();
      updateTurnCount();

      const responseDiv = appendToGame('', 'narrator');
      responseDiv.classList.add('loading');

      try {
        const safetySettings = [
          { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' },
        ];

        // 슬라이딩 윈도우: 최근 N개만 전송, 나머지는 요약으로 대체
        const windowStart = Math.max(0, conversationHistory.length - SLIDING_WINDOW_SIZE);
        const recentMessages = conversationHistory.slice(windowStart);

        let systemPrompt = buildPrompt();
        if (storySummary) {
          systemPrompt += `\n\n[이전 이야기 요약]\n${storySummary}`;
        }

        const body = cachedContentName
          ? { cachedContent: cachedContentName, contents: recentMessages, safetySettings }
          : { system_instruction: { parts: [{ text: systemPrompt }] }, contents: recentMessages, safetySettings };

        const res = await fetch(
          `${GEMINI_BASE}/models/${model}:streamGenerateContent?alt=sse&key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          }
        );

        if (!res.ok) {
          const err = await res.text();
          throw new Error(`API Error ${res.status}: ${err}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullResponse = '';
        let buffer = '';
        let renderTimer = null;
        let lastUsageMetadata = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const jsonStr = line.slice(6).trim();
            if (!jsonStr || jsonStr === '[DONE]') continue;

            try {
              const data = JSON.parse(jsonStr);
              if (data.usageMetadata) lastUsageMetadata = data.usageMetadata;
              const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
              if (text) {
                fullResponse += text;
                clearTimeout(renderTimer);
                renderTimer = setTimeout(() => {
                  responseDiv.innerHTML = renderMarkdown(fullResponse);
                  responseDiv.classList.add('markdown-rendered');
                  els.gameOutput.scrollTop = els.gameOutput.scrollHeight;
                }, 80);
              }
            } catch (e) {}
          }
        }

        clearTimeout(renderTimer);
        responseDiv.innerHTML = renderMarkdown(fullResponse);
        responseDiv.classList.add('markdown-rendered');
        els.gameOutput.scrollTop = els.gameOutput.scrollHeight;

        if (lastUsageMetadata) updateTokenDisplay(lastUsageMetadata);

        conversationHistory.push({ role: 'model', parts: [{ text: fullResponse }] });
        markDirty();
        updateTurnCount();
        if (conversationHistory.length > SLIDING_WINDOW_SIZE + 10) {
          generateSummary();
        }
      } catch (err) {
        responseDiv.textContent = `[오류] ${err.message}`;
        responseDiv.style.color = 'var(--accent)';
        conversationHistory.pop();
      } finally {
        responseDiv.classList.remove('loading');
        isGenerating = false;
        els.gameInput.disabled = false;
        els.btnSend.disabled = false;
        els.btnStart.disabled = false;
        els.gameInput.focus();
      }
    }

    // --- Story List UI ---
    async function loadStoryList() {
      if (!db) return;
      const select = $('storySelect');
      try {
        const q = query(collection(db, 'stories'), firestoreLimit(50));
        const snap = await getDocs(q);
        const stories = [];
        snap.forEach(d => {
          const data = d.data();
          stories.push({ id: d.id, title: data.title || '제목 없음', createdAt: data.createdAt });
        });
        // 클라이언트에서 정렬 (인덱스 불필요)
        stories.sort((a, b) => {
          const ta = a.createdAt?.toMillis?.() || a.createdAt?.seconds * 1000 || 0;
          const tb = b.createdAt?.toMillis?.() || b.createdAt?.seconds * 1000 || 0;
          return tb - ta;
        });
        for (const s of stories) {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = `${s.title} (${s.id.slice(0, 8)}...)`;
          select.appendChild(opt);

    async function loadSession(sessionId) {
      let localData = loadSessionFromLocal(sessionId);
      let firestoreData = await loadSessionFromFirestore(sessionId);

      if (!localData && !firestoreData) { alert('세션을 찾을 수 없습니다.'); return; }

      let data;
      if (localData && firestoreData) {
        const localTime = localData.updatedAt || 0;
        const fsTime = firestoreData.updatedAt?.toMillis?.() || firestoreData.updatedAt?.seconds * 1000 || 0;
        data = localTime > fsTime ? localData : firestoreData;
      } else {
        data = firestoreData || localData;
      }

      currentSessionId = sessionId;

      if (data.preset) {
        Object.assign(settingsData, data.preset);
        if ('useLatex' in data.preset) els.useLatex.checked = !!data.preset.useLatex;
        if ('useCache' in data.preset) els.useCache.checked = !!data.preset.useCache;
        updateBadges();
      }
      if (data.model && els.modelSelect.querySelector(`option[value="${data.model}"]`)) {
        els.modelSelect.value = data.model;
      }
      if (data.title) { settingsData.title = data.title; els.settingsName.textContent = data.title; }

      const messages = data.messages || [];
      if (messages.length > 0 && messages[0].content !== undefined) {
        conversationHistory = messagesFromStorage(messages);
      } else {
        conversationHistory = messages;
      }
      storySummary = data.summary || '';
      summaryUpToIndex = data.summaryUpToIndex || 0;
      updateSummaryBadge();

      els.gameOutput.innerHTML = '';
      for (const msg of conversationHistory) {
        const text = msg.parts[0].text;
        if (msg.role === 'user') {
          appendToGame(`▸ ${text}`, 'user-action');
        } else {
          const div = appendToGame('', 'narrator');
          div.innerHTML = renderMarkdown(text);
          div.classList.add('markdown-rendered');
        }
      }

      els.gameInput.disabled = false; els.btnSend.disabled = false;
      addToSessionList(sessionId, data.title || '제목 없음');
      renderSessionList(); renderSessionId(); updateTurnCount();
      isDirty = false; updateSaveStatus('saved'); startAutoSave();

      if (firestoreData) saveSessionToLocal(sessionId, { ...data, updatedAt: Date.now(), lastPlayedAt: Date.now() });
    }

    // --- Init ---
    loadFromLocalStorage();
    updateBadges();
    if (els.apiKey.value.trim()) fetchModels(els.apiKey.value.trim());
    renderSessionList();
    renderSaveStatus();
    loadStoryList();

    // --- URL Parameter Auto-Load ---
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const storyId = params.get('storyId');
      const sessionId = params.get('sessionId');

      if (sessionId) {
        // 세션 이어하기
        await loadSession(sessionId);
      } else if (storyId) {
        // 스토리 선택 → 설정 적용
        const data = await loadStoryFromFirestore(storyId);
        if (data) {
          settingsData.title = data.title || '';
          settingsData.worldSetting = data.worldSetting || '';
          settingsData.story = data.story || '';
          settingsData.characterName = data.characterName || '';
          settingsData.characterSetting = data.characterSetting || '';
          settingsData.characters = data.characters || '';
          settingsData.userNote = data.userNote || '';
          settingsData.systemRules = data.systemRules || '';
          if ('useLatex' in data) els.useLatex.checked = !!data.useLatex;
          if ('useCache' in data) els.useCache.checked = !!data.useCache;
          currentStoryId = storyId;
          els.settingsName.textContent = data.title || '제목 없음';
          updateBadges();
          // 스토리 드롭다운에서 선택
          const select = $('storySelect');
          if (select.querySelector(`option[value="${storyId}"]`)) {
            select.value = storyId;
          }
        }
      }
    })();
  </script>
</body>
</html>
