<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Story Game</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.38/dist/katex.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/markdown.css">
  <link rel="stylesheet" href="styles/editor.css">
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.38/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" crossorigin="anonymous"></script>
  <div class="container">
    <!-- Panel 1: Settings -->
    <div class="panel panel-settings" id="panelSettings">
      <h2 class="panel-title" style="display:flex;align-items:center;justify-content:space-between;">
        <span>① 설정</span>
        <a href="index.html" style="font-size:12px;color:var(--text-muted);text-decoration:none;border:1px solid var(--border);padding:6px 12px;border-radius:6px;">홈</a>
      </h2>
      <div class="form-group">
        <label>기본 프리셋</label>
        <select id="presetSelect">
          <option value="">직접 작성...</option>
        </select>
      </div>
      <div class="form-group">
        <label for="presetTitle">제목</label>
        <input type="text" id="presetTitle" placeholder="프리셋 제목 (예: 무협 강호 모험)">
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="Gemini API Key 입력">
      </div>
      <div class="form-group">
        <label for="modelSelect">모델 선택</label>
        <select id="modelSelect" disabled>
          <option value="">API Key를 입력하세요</option>
        </select>
      </div>
      <div class="form-group">
        <label for="systemRules">시스템 규칙</label>
        <textarea id="systemRules" rows="4" placeholder="AI 출력 규칙, 금지사항, 대사 형식 등..."></textarea>
      </div>
      <div class="form-group">
        <label for="worldSetting">세계관</label>
        <textarea id="worldSetting" rows="4" placeholder="게임의 세계관을 설명하세요..."></textarea>
      </div>
      <div class="form-group">
        <label for="story">스토리</label>
        <textarea id="story" rows="4" placeholder="메인 스토리/줄거리..."></textarea>
      </div>
      <div class="form-group">
        <label for="characters">등장인물</label>
        <textarea id="characters" rows="4" placeholder="주요 NPC 정보 (이름, 성격, 역할 등)..."></textarea>
      </div>
      <div class="form-group">
        <label for="characterName">주인공 이름</label>
        <input type="text" id="characterName" placeholder="캐릭터 이름">
      </div>
      <div class="form-group">
        <label for="characterSetting">주인공 설정</label>
        <textarea id="characterSetting" rows="3" placeholder="캐릭터 배경/성격/능력..."></textarea>
      </div>
      <div class="form-group">
        <label for="userNote">유저노트</label>
        <textarea id="userNote" rows="3" placeholder="참고 메모 (분위기, 선호 장르 등)..."></textarea>
      </div>
      <div class="form-group checkbox-group">
        <label><input type="checkbox" id="useLatex" checked> LaTeX 연출 활성화</label>
      </div>
      <div class="form-group checkbox-group">
        <label><input type="checkbox" id="useCache"> 프롬프트 캐시 사용</label>
        <span class="cache-status" id="cacheStatus"></span>
      </div>
      <div class="form-group checkbox-group">
        <label><input type="checkbox" id="isPublic" checked> 스토리 공개 (홈에서 검색 가능)</label>
      </div>
      <button id="btnStart" class="btn btn-primary">게임 시작</button>
      <div class="btn-row">
        <button id="btnSave" class="btn btn-secondary">저장</button>
        <button id="btnLoad" class="btn btn-secondary">불러오기</button>
      </div>
      <div class="btn-row">
        <button id="btnDelete" class="btn btn-secondary">삭제</button>
        <button id="btnShareStory" class="btn btn-secondary">공유</button>
      </div>
    </div>

    <!-- Panel 2: Prompt Preview -->
    <div class="panel panel-prompt" id="panelPrompt">
      <h2 class="panel-title">② 프롬프트 미리보기</h2>
      <div class="prompt-preview" id="promptPreview"></div>
    </div>

    <!-- Panel 3: Game -->
    <div class="panel panel-game" id="panelGame">
      <h2 class="panel-title">③ 게임</h2>
      <div class="token-bar" id="tokenBar">
        <span id="tokenInfo">토큰: 0</span>
        <span id="costInfo">$0.000000</span>
      </div>
      <div class="game-output" id="gameOutput">
        <p class="game-placeholder">게임을 시작하려면 설정을 입력하고 "게임 시작" 버튼을 누르세요.</p>
      </div>
      <div class="game-input-area">
        <input type="text" id="gameInput" placeholder="행동을 입력하세요..." disabled>
        <button id="btnSend" class="btn btn-primary" disabled>전송</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { hashPassword, verifyPassword } from './js/crypto.js';
    import { saveStoryToFirestore, loadStoryFromFirestore, updateStoryInFirestore, deleteStoryFromFirestore, loadPublicPresets } from './js/firestore-ops.js';
    import { renderMarkdown } from './js/markdown-renderer.js';
    import { updateTokenDisplay, resetTokens } from './js/token-tracker.js';
    import { initTheme } from './js/theme.js';

    // --- DOM References ---
    const $ = id => document.getElementById(id);

    const els = {
      presetTitle: $('presetTitle'),
      apiKey: $('apiKey'),
      modelSelect: $('modelSelect'),
      worldSetting: $('worldSetting'),
      story: $('story'),
      characterName: $('characterName'),
      characterSetting: $('characterSetting'),
      characters: $('characters'),
      userNote: $('userNote'),
      systemRules: $('systemRules'),
      promptPreview: $('promptPreview'),
      gameOutput: $('gameOutput'),
      gameInput: $('gameInput'),
      btnStart: $('btnStart'),
      btnSend: $('btnSend'),
      btnSave: $('btnSave'),
      btnLoad: $('btnLoad'),
      isPublic: $('isPublic'),
      useLatex: $('useLatex'),
      useCache: $('useCache'),
      cacheStatus: $('cacheStatus'),
      tokenInfo: $('tokenInfo'),
      costInfo: $('costInfo'),
    };

    // --- Prompt Builder ---
    function buildPrompt() {
      const w = els.worldSetting.value.trim();
      const s = els.story.value.trim();
      const cn = els.characterName.value.trim();
      const cs = els.characterSetting.value.trim();
      const ch = els.characters.value.trim();
      const un = els.userNote.value.trim();
      const sr = els.systemRules.value.trim();

      let prompt = `당신은 인터랙티브 소설 게임의 AI 스토리텔러입니다.
아래 설정을 기반으로 몰입감 있는 소설을 진행하세요.

사용자가 행동을 입력하면 그에 따라 이야기를 이어가세요.
각 응답은 소설체로 작성하세요.`;

      if (sr) prompt += `\n\n[시스템 규칙]\n${sr}`;
      if (w) prompt += `\n\n[세계관]\n${w}`;
      if (s) prompt += `\n\n[스토리]\n${s}`;
      if (ch) prompt += `\n\n[등장인물]\n${ch}`;
      if (cn || cs) {
        prompt += `\n\n[주인공]`;
        if (cn) prompt += `\n이름: ${cn}`;
        if (cs) prompt += `\n설정: ${cs}`;
      }
      if (un) prompt += `\n\n[유저노트]\n${un}`;

      // LaTeX 연출 지시
      if (els.useLatex.checked) {
        prompt += `\n\n[LaTeX 연출 규칙]
대사와 효과음에 LaTeX 수식 문법을 사용하여 시각적으로 연출하세요.
반드시 $ 기호로 감싸서 인라인 수식으로 작성합니다.

■ 대사 작성 형식:
발화자 이름과 대사를 반드시 하나의 $ 안에 함께 포함하세요.
형식: $\\text{발화자: }\\textsf{\\textbf{"대사 내용"}}$
잘못된 예: 사내 $\\textsf{\\textbf{"대사"}}$ (발화자가 $ 밖에 있음 ✗)
올바른 예: $\\text{사내: }\\textsf{\\textbf{"대사"}}$ (발화자가 $ 안에 있음 ✓)

■ 대사 감정 연출:
- 일반 대사: $\\text{이름: }\\textsf{\\textbf{"대사 내용"}}$
- 귓속말/속삭임: $\\text{이름: }\\color{gray}\\small\\textsf{\\textbf{"속삭이는 내용"}}$
- 외침/비명: $\\text{이름: }\\huge\\textsf{\\textbf{"외치는 내용!"}}$
- 분노/격앙: $\\text{이름: }\\large\\color{red}\\textsf{\\textbf{"분노하는 내용!"}}$
- 부끄러움/유혹: $\\text{이름: }\\color{lightpink}\\textsf{\\textbf{"부끄러운 내용"}}$
- 슬픔/비탄: $\\text{이름: }\\color{SteelBlue}\\textsf{\\textbf{"슬픈 내용..."}}$
- 냉소/조롱: $\\text{이름: }\\color{darkviolet}\\textit{\\textsf{"냉소적인 내용"}}$
- 위압/경고: $\\text{이름: }\\Large\\color{darkred}\\textsf{\\textbf{"위압적인 내용"}}$
- 신비/예언: $\\text{이름: }\\color{gold}\\mathcal{\\text{신비로운 내용}}$

■ 효과 연출:
- 효과음/환경음: $\\colorbox{black}{\\color{cyan}\\small\\text{효과음}}$
- 시스템/알림: $\\fcolorbox{gray}{black}{\\color{lime}\\footnotesize\\text{시스템 메시지}}$
- 취소선(부정/철회): $\\cancel{\\text{취소된 내용}}$
- 강조/각성: $\\boxed{\\color{orange}\\textbf{\\text{강조 내용}}}$

■ 주의사항 (매우 중요 - 반드시 준수):
- 모든 LaTeX 표현은 반드시 $ 기호로 열고 닫아야 합니다. $가 없으면 렌더링되지 않습니다!
- 잘못된 예: \\text{이름: }\\textsf{\\textbf{"대사"}} ($ 없음 ✗)
- 올바른 예: $\\text{이름: }\\textsf{\\textbf{"대사"}}$ ($ 있음 ✓)
- 발화자 이름은 반드시 $ 안에 \\text{이름: } 형태로 포함하세요.
- HTML 태그나 &quot; 같은 HTML 엔티티는 절대 사용하지 마세요. 따옴표는 그냥 "를 쓰세요.
- 지문/나레이션은 LaTeX 없이 일반 텍스트로 작성하세요.
- 대사에만 LaTeX를 적용하세요. 남용하지 마세요.`;
      }

      // {{user}}를 주인공 이름으로 치환
      if (cn) prompt = prompt.replaceAll('{{user}}', cn);

      return prompt;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
    }

    function updatePromptPreview() {
      const prompt = buildPrompt();
      const escaped = escapeHtml(prompt);
      const sectionMatch = escaped.match(/\[(시스템 규칙|세계관|스토리|주인공|유저노트|LaTeX 연출 규칙)\]/);
      const firstSectionIdx = sectionMatch ? sectionMatch.index : -1;
      let html;
      if (firstSectionIdx > 0) {
        const preamble = escaped.substring(0, firstSectionIdx);
        const rest = escaped.substring(firstSectionIdx);
        html = `<span class="prompt-system">${preamble.trim()}</span>\n\n` +
          rest.replace(/\[(시스템 규칙)\]/g, '<span class="prompt-system">[$1]</span>')
               .replace(/\[(세계관|스토리|등장인물|주인공|유저노트|LaTeX 연출 규칙)\]/g, '<span class="prompt-section">[$1]</span>');
      } else {
        html = `<span class="prompt-system">${escaped}</span>`;
      }
      els.promptPreview.innerHTML = html;
    }

    const inputFields = ['presetTitle', 'systemRules', 'worldSetting', 'story', 'characters', 'characterName', 'characterSetting', 'userNote'];

    // Task #1: Debounce preview + localStorage
    let previewTimer = null;
    let saveTimer = null;
    function debouncedPreview() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(updatePromptPreview, 300);
    }
    function debouncedSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveToLocalStorage, 500);
    }

    inputFields.forEach(id => {
      els[id].addEventListener('input', debouncedPreview);
    });

    updatePromptPreview();

    // --- localStorage ---
    const STORAGE_KEY = 'ai-story-game-settings';

    function getSettingsData() {
      return {
        title: els.presetTitle.value,
        apiKey: els.apiKey.value,
        model: els.modelSelect.value,
        worldSetting: els.worldSetting.value,
        story: els.story.value,
        characterName: els.characterName.value,
        characterSetting: els.characterSetting.value,
        characters: els.characters.value,
        userNote: els.userNote.value,
        systemRules: els.systemRules.value,
        useLatex: els.useLatex.checked,
        useCache: els.useCache.checked,
        isPublic: els.isPublic.checked,
      };
    }

    function applySettingsData(data) {
      if ('title' in data) els.presetTitle.value = data.title || '';
      if ('apiKey' in data) els.apiKey.value = data.apiKey || '';
      if ('model' in data) els.modelSelect.value = data.model || '';
      if ('characters' in data) els.characters.value = data.characters || '';
      if ('systemRules' in data) els.systemRules.value = data.systemRules || '';
      if ('useLatex' in data) els.useLatex.checked = !!data.useLatex;
      if ('useCache' in data) els.useCache.checked = !!data.useCache;
      if ('isPublic' in data) els.isPublic.checked = data.isPublic !== false;
      if ('worldSetting' in data) els.worldSetting.value = data.worldSetting || '';
      if ('story' in data) els.story.value = data.story || '';
      if ('characterName' in data) els.characterName.value = data.characterName || '';
      if ('characterSetting' in data) els.characterSetting.value = data.characterSetting || '';
      if ('userNote' in data) els.userNote.value = data.userNote || '';
      updatePromptPreview();
    }

    function saveToLocalStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(getSettingsData()));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { applySettingsData(JSON.parse(saved)); } catch (e) {}
      }
    }

    // Auto-save on any input change (debounced)
    [...inputFields, 'apiKey'].forEach(id => {
      els[id].addEventListener('input', debouncedSave);
    });
    els.modelSelect.addEventListener('change', saveToLocalStorage);

    // --- Story Save/Load (Firestore) ---
    let currentStoryId = null;
    let currentPasswordHash = null;

    els.btnSave.addEventListener('click', async () => {
      if (!db) { alert('Firebase가 설정되지 않았습니다.'); return; }

      // 첫 저장 시 암호 설정
      if (!currentPasswordHash) {
        const password = prompt('스토리 수정 암호를 설정하세요 (필수):');
        if (!password) { alert('암호는 필수입니다.'); return; }
        currentPasswordHash = await hashPassword(password);
      }

      const data = getSettingsData();
      delete data.apiKey;
      delete data.model;

      if (currentStoryId) {
        // 기존 스토리 업데이트
        const ok = await updateStoryInFirestore(currentStoryId, data, currentPasswordHash);
        alert(ok ? '스토리가 저장되었습니다.' : '저장에 실패했습니다.');
      } else {
        // 새 스토리 생성
        const storyId = await saveStoryToFirestore(data, currentPasswordHash);
        if (storyId) {
          currentStoryId = storyId;
          updateSaveButtonText();
          if (!els.isPublic.checked) {
            alert(`스토리가 저장되었습니다.\n비공개 스토리입니다. 공유하려면 ID를 복사하세요.\nID: ${storyId}`);
          } else {
            alert('스토리가 저장되었습니다.');
          }
        } else {
          alert('저장에 실패했습니다.');
        }
      }
    });

    els.btnLoad.addEventListener('click', async () => {
      if (!db) { alert('Firebase가 설정되지 않았습니다.'); return; }
      const storyId = prompt('스토리 ID를 입력하세요:');
      if (!storyId) return;

      const existing = await loadStoryFromFirestore(storyId);
      if (!existing) { alert('스토리를 찾을 수 없습니다.'); return; }

      if (!existing.passwordHash) { alert('이 스토리는 암호가 설정되지 않아 편집할 수 없습니다.'); return; }
      const password = prompt('암호를 입력하세요:');
      if (!password) return;
      if (!(await verifyPassword(password, existing.passwordHash))) {
        alert('암호가 일치하지 않습니다.');
        return;
      }

      loadAndApplyStory(existing);
      currentStoryId = storyId;
      currentPasswordHash = existing.passwordHash;
      updateSaveButtonText();
      alert('스토리를 불러왔습니다.');
    });

    // Task #5: CSS class instead of inline styles
    function updateSaveButtonText() {
      if (currentStoryId) {
        els.btnSave.textContent = `저장 (${currentStoryId.slice(0, 8)}...)`;
        els.btnSave.classList.add('btn-saved');
      }
    }

    // Task #3: Unified button state toggle
    function setGameControlsEnabled(enabled) {
      els.gameInput.disabled = !enabled;
      els.btnSend.disabled = !enabled;
      els.btnStart.disabled = !enabled;
    }

    // Task #4: Unified story apply helper
    function loadAndApplyStory(data) {
      applySettingsData(data);
      saveToLocalStorage();
    }

    // --- Gemini API ---
    const GEMINI_BASE = 'https://generativelanguage.googleapis.com/v1beta';

    async function fetchModels(apiKey) {
      if (!apiKey) return;
      els.modelSelect.disabled = true;
      els.modelSelect.innerHTML = '<option value="">모델 목록 조회 중...</option>';

      try {
        const res = await fetch(`${GEMINI_BASE}/models?key=${apiKey}`);
        if (!res.ok) throw new Error(`API Error: ${res.status}`);
        const data = await res.json();
        const models = (data.models || [])
          .filter(m => m.name.startsWith('models/gemini-') && m.supportedGenerationMethods?.includes('generateContent'))
          .map(m => ({ id: m.name.replace('models/', ''), name: m.displayName || m.name.replace('models/', '') }));

        els.modelSelect.innerHTML = models.length
          ? models.map(m => `<option value="${m.id}">${m.name}</option>`).join('')
          : '<option value="">사용 가능한 모델이 없습니다</option>';
        els.modelSelect.disabled = models.length === 0;

        // Restore saved model selection
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const { model } = JSON.parse(saved);
          if (model && models.some(m => m.id === model)) {
            els.modelSelect.value = model;
          }
        }
      } catch (err) {
        els.modelSelect.innerHTML = `<option value="">오류: ${err.message}</option>`;
        els.modelSelect.disabled = true;
      }
    }

    // Debounced API key input → fetch models
    let apiKeyTimer = null;
    els.apiKey.addEventListener('input', () => {
      clearTimeout(apiKeyTimer);
      apiKeyTimer = setTimeout(() => fetchModels(els.apiKey.value.trim()), 800);
    });

    // Load saved settings on page load
    loadFromLocalStorage();
    if (els.apiKey.value.trim()) fetchModels(els.apiKey.value.trim());

    // --- Cache ---
    let cachedContentName = null;

    async function createCache(apiKey, model) {
      const prompt = buildPrompt();
      els.cacheStatus.textContent = '캐시 생성 중...';
      els.cacheStatus.className = 'cache-status';

      try {
        const res = await fetch(`${GEMINI_BASE}/cachedContents?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: `models/${model}`,
            systemInstruction: {
              parts: [{ text: prompt }],
            },
            ttl: '3600s',
          }),
        });

        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Cache Error ${res.status}: ${err}`);
        }

        const data = await res.json();
        cachedContentName = data.name;
        els.cacheStatus.textContent = '캐시 활성';
        els.cacheStatus.className = 'cache-status active';
        return true;
      } catch (err) {
        els.cacheStatus.textContent = `캐시 실패: ${err.message}`;
        els.cacheStatus.className = 'cache-status';
        cachedContentName = null;
        return false;
      }
    }

    function clearCache() {
      cachedContentName = null;
      els.cacheStatus.textContent = '';
      els.cacheStatus.className = 'cache-status';
    }

    els.useLatex.addEventListener('change', () => {
      saveToLocalStorage();
      updatePromptPreview();
    });

    els.useCache.addEventListener('change', () => {
      if (!els.useCache.checked) clearCache();
      saveToLocalStorage();
    });

    // --- Game State ---
    const MAX_HISTORY = 20;
    let conversationHistory = [];
    let isGenerating = false;

    // --- Markdown Parser ---
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    // Task #2: Unified render helper
    function renderResponse(div, text) {
      div.innerHTML = renderMarkdown(text);
      div.classList.add('markdown-rendered');
      els.gameOutput.scrollTop = els.gameOutput.scrollHeight;
    }

    function appendToGame(text, className) {
      const placeholder = els.gameOutput.querySelector('.game-placeholder');
      if (placeholder) placeholder.remove();

      const div = document.createElement('div');
      div.className = `game-text ${className}`;
      div.textContent = text;
      els.gameOutput.appendChild(div);
      els.gameOutput.scrollTop = els.gameOutput.scrollHeight;
      return div;
    }

    async function sendToGemini(userMessage) {
      const apiKey = els.apiKey.value.trim();
      const model = els.modelSelect.value;

      if (!apiKey || !model) {
        alert('API Key와 모델을 선택해주세요.');
        return;
      }

      isGenerating = true;
      setGameControlsEnabled(false);

      conversationHistory.push({ role: 'user', parts: [{ text: userMessage }] });

      const responseDiv = appendToGame('', 'narrator');
      responseDiv.classList.add('loading');

      try {
        const safetySettings = [
          { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' },
        ];

        const body = cachedContentName
          ? { cachedContent: cachedContentName, contents: conversationHistory, safetySettings }
          : { system_instruction: { parts: [{ text: buildPrompt() }] }, contents: conversationHistory, safetySettings };

        const res = await fetch(
          `${GEMINI_BASE}/models/${model}:streamGenerateContent?alt=sse&key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          }
        );

        if (!res.ok) {
          const err = await res.text();
          throw new Error(`API Error ${res.status}: ${err}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullResponse = '';
        let buffer = '';
        let renderTimer = null;
        let lastUsageMetadata = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const jsonStr = line.slice(6).trim();
            if (!jsonStr || jsonStr === '[DONE]') continue;

            try {
              const data = JSON.parse(jsonStr);
              if (data.usageMetadata) lastUsageMetadata = data.usageMetadata;
              const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
              if (text) {
                fullResponse += text;
                clearTimeout(renderTimer);
                renderTimer = setTimeout(() => renderResponse(responseDiv, fullResponse), 80);
              }
            } catch (e) { /* skip malformed JSON */ }
          }
        }

        // Final render with complete markdown
        clearTimeout(renderTimer);
        renderResponse(responseDiv, fullResponse);

        // Update token & cost display
        if (lastUsageMetadata) updateTokenDisplay(lastUsageMetadata, model, els.tokenInfo, els.costInfo);

        conversationHistory.push({ role: 'model', parts: [{ text: fullResponse }] });
        // Task #6: Limit history to MAX_HISTORY messages
        if (conversationHistory.length > MAX_HISTORY) {
          conversationHistory = conversationHistory.slice(-MAX_HISTORY);
        }
      } catch (err) {
        responseDiv.textContent = `[오류] ${err.message}`;
        responseDiv.style.color = 'var(--accent)';
        conversationHistory.pop();
      } finally {
        responseDiv.classList.remove('loading');
        isGenerating = false;
        setGameControlsEnabled(true);
        els.gameInput.focus();
      }
    }

    // --- Game Controls ---
    els.btnStart.addEventListener('click', async () => {
      if (isGenerating) return;
      const apiKey = els.apiKey.value.trim();
      const model = els.modelSelect.value;
      if (!apiKey) { alert('API Key를 입력해주세요.'); els.apiKey.focus(); return; }
      if (!model) { alert('모델을 선택해주세요.'); return; }
      conversationHistory = [];
      els.gameOutput.innerHTML = '';
      resetTokens(els.tokenInfo, els.costInfo);
      setGameControlsEnabled(true);

      // 캐시 설정
      clearCache();
      if (els.useCache.checked) {
        const ok = await createCache(apiKey, model);
        if (!ok) {
          alert('캐시 생성에 실패했습니다. 캐시 없이 진행합니다.');
        }
      }

      sendToGemini('게임을 시작해줘');
    });

    els.btnSend.addEventListener('click', () => {
      if (isGenerating) return;
      const text = els.gameInput.value.trim();
      if (!text) return;
      appendToGame(`▸ ${text}`, 'user-action');
      els.gameInput.value = '';
      sendToGemini(text);
    });

    els.gameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        els.btnSend.click();
      }
    });

    // --- Story Share (Copy ID) ---
    $('btnShareStory').addEventListener('click', async () => {
      if (!currentStoryId) { alert('먼저 저장해주세요.'); return; }
      try {
        await navigator.clipboard.writeText(currentStoryId);
        alert(`스토리 ID가 복사되었습니다.\n${currentStoryId}`);
      } catch (e) {
        prompt('스토리 ID를 복사하세요:', currentStoryId);
      }
    });

    // --- Story Delete ---
    $('btnDelete').addEventListener('click', async () => {
      if (!db) { alert('Firebase가 설정되지 않았습니다.'); return; }
      if (!currentStoryId) { alert('먼저 저장하거나 불러오세요.'); return; }

      const password = prompt('삭제하려면 암호를 입력하세요:');
      if (!password) return;
      if (!(await verifyPassword(password, currentPasswordHash))) {
        alert('암호가 일치하지 않습니다.');
        return;
      }

      if (!confirm('정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;

      const ok = await deleteStoryFromFirestore(currentStoryId);
      if (ok) {
        alert('스토리가 삭제되었습니다.');
        currentStoryId = null;
        currentPasswordHash = null;
        els.btnSave.textContent = '저장';
        els.btnSave.classList.remove('btn-saved');
      } else {
        alert('삭제에 실패했습니다.');
      }
    });

    // --- Preset System ---
    async function initPresets() {
      try {
        const res = await fetch('presets/default.json');
        if (res.ok) {
          const data = await res.json();
          const opt = document.createElement('option');
          opt.value = '__default__';
          opt.textContent = data.title || '기본 세계관';
          opt.dataset.preset = JSON.stringify(data);
          $('presetSelect').appendChild(opt);
        }
      } catch {}

      const presets = await loadPublicPresets();
      for (const p of presets) {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.title || p.id;
        opt.dataset.preset = JSON.stringify(p);
        $('presetSelect').appendChild(opt);
      }
    }

    $('presetSelect').addEventListener('change', (e) => {
      const opt = e.target.selectedOptions[0];
      if (!opt?.dataset?.preset) return;
      const data = JSON.parse(opt.dataset.preset);
      applySettingsData(data);
      saveToLocalStorage();
    });

    initPresets();

    // --- Auto-load story from URL param ---
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const storyId = params.get('storyId');
      if (!storyId || !db) return;

      const data = await loadStoryFromFirestore(storyId);
      if (!data) { alert('스토리를 찾을 수 없습니다.'); return; }

      if (!data.passwordHash) {
        loadAndApplyStory(data);
        alert('암호가 없는 스토리입니다. 읽기 전용으로 로드되었습니다.');
        return;
      }

      const password = prompt('이 스토리는 암호로 보호되어 있습니다.\n수정하려면 암호를 입력하세요:');
      if (!password) {
        loadAndApplyStory(data);
        return;
      }
      if (!(await verifyPassword(password, data.passwordHash))) {
        alert('암호가 일치하지 않습니다. 읽기 전용으로 로드됩니다.');
        loadAndApplyStory(data);
        return;
      }

      loadAndApplyStory(data);
      currentStoryId = storyId;
      currentPasswordHash = data.passwordHash;
      updateSaveButtonText();
    })();

    // --- Theme ---
    initTheme();
  </script>
</body>
</html>
