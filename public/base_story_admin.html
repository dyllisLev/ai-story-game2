<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프리셋 관리 (Admin)</title>
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/base.css">
  <style>
    body {
      height: auto;
      overflow: auto;
      padding: 0;
    }

    .admin-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .admin-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .admin-header .header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Section titles */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    /* Preset list */
    .preset-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 32px;
    }

    .preset-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
      gap: 12px;
    }

    .preset-item:hover {
      border-color: var(--text-muted);
    }

    .preset-item.active {
      border-color: var(--accent);
    }

    .preset-item-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .preset-item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge-default {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      color: var(--cyan);
      background: rgba(83, 216, 251, 0.12);
      border: 1px solid rgba(83, 216, 251, 0.3);
      border-radius: 4px;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .preset-item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-icon:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-icon.danger:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .preset-empty {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      background: var(--bg-panel);
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    /* Form */
    .form-section {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .form-section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-section-title .form-mode-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .form-mode-badge.new {
      background: rgba(63, 185, 80, 0.15);
      color: #3fb950;
      border: 1px solid rgba(63, 185, 80, 0.3);
    }

    .form-mode-badge.edit {
      background: rgba(83, 216, 251, 0.12);
      color: var(--cyan);
      border: 1px solid rgba(83, 216, 251, 0.3);
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .form-actions .btn-primary {
      flex: 1;
      margin-top: 0;
    }

    .btn-danger {
      padding: 10px 16px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      color: var(--accent);
      transition: background 0.2s;
    }

    .btn-danger:hover {
      background: rgba(233, 69, 96, 0.12);
    }

    .btn-ghost {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-new-preset {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-new-preset:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { border-color: rgba(63, 185, 80, 0.5); }
    #toast.error { border-color: rgba(233, 69, 96, 0.5); color: var(--accent); }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .preset-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .preset-item-actions {
        align-self: flex-end;
      }

      .form-actions {
        flex-direction: column;
      }
    }

    /* Tabs */
    .tab-nav {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tooltip {
      display: inline-block;
      width: 16px;
      height: 16px;
      line-height: 16px;
      text-align: center;
      font-size: 11px;
      font-style: normal;
      color: var(--text-muted);
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: help;
      margin-left: 4px;
      vertical-align: middle;
    }

    .safety-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .safety-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .safety-label {
      flex: 0 0 120px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .safety-select {
      flex: 1;
      padding: 6px 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- Main content -->
  <div class="admin-wrap" id="mainContent">
    <div class="admin-header">
      <h1>관리자</h1>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="presets">프리셋</button>
      <button class="tab-btn" data-tab="config">앱 설정</button>
    </div>

    <!-- Tab: 프리셋 -->
    <div class="tab-content active" id="tabPresets">

    <!-- Preset list -->
    <div class="section-title">프리셋 목록</div>
    <button class="btn-new-preset" id="btnNewPreset">+ 새 프리셋 추가</button>
    <div class="preset-list" id="presetList">
      <div class="preset-empty">불러오는 중... <span class="spinner"></span></div>
    </div>

    <!-- Preset form -->
    <div class="form-section" id="formSection" style="display:none;">
      <div class="form-section-title">
        <span id="formTitle">프리셋 편집</span>
        <span class="form-mode-badge" id="formModeBadge"></span>
      </div>

      <input type="hidden" id="editingPresetId">

      <div class="form-group">
        <label for="fieldTitle">제목 *</label>
        <input type="text" id="fieldTitle" placeholder="프리셋 제목 (예: 무협 강호 모험)">
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="fieldIsDefault">
          에디터 드롭다운에 표시 (isDefault)
        </label>
      </div>

      <div class="form-group">
        <label for="fieldSystemRules">시스템 규칙</label>
        <textarea id="fieldSystemRules" rows="4" placeholder="AI 출력 규칙, 금지사항, 대사 형식 등..."></textarea>
      </div>

      <div class="form-group">
        <label for="fieldWorldSetting">세계관</label>
        <textarea id="fieldWorldSetting" rows="4" placeholder="게임의 세계관을 설명하세요..."></textarea>
      </div>

      <div class="form-group">
        <label for="fieldStory">스토리</label>
        <textarea id="fieldStory" rows="4" placeholder="메인 스토리/줄거리..."></textarea>
      </div>

      <div class="form-group">
        <label for="fieldCharacters">등장인물</label>
        <textarea id="fieldCharacters" rows="4" placeholder="주요 NPC 정보 (이름, 성격, 역할 등)..."></textarea>
      </div>

      <div class="form-group">
        <label for="fieldCharacterName">주인공 이름</label>
        <input type="text" id="fieldCharacterName" placeholder="캐릭터 이름">
      </div>

      <div class="form-group">
        <label for="fieldCharacterSetting">주인공 설정</label>
        <textarea id="fieldCharacterSetting" rows="3" placeholder="캐릭터 배경/성격/능력..."></textarea>
      </div>

      <div class="form-group">
        <label for="fieldUserNote">유저노트</label>
        <textarea id="fieldUserNote" rows="3" placeholder="참고 메모 (분위기, 선호 장르 등)..."></textarea>
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="fieldUseLatex" checked>
          LaTeX 연출 활성화 (useLatex)
        </label>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="btnSavePreset">저장</button>
        <button class="btn-danger" id="btnDeletePreset" style="display:none;">삭제</button>
        <button class="btn-ghost" id="btnCancelForm">취소</button>
      </div>
    </div>

    </div><!-- /tabPresets -->

    <!-- Tab: 앱 설정 -->
    <div class="tab-content" id="tabConfig" style="display:none;">

      <!-- 프롬프트 설정 -->
      <div class="form-section" style="margin-bottom: 20px;">
        <div class="form-section-title">프롬프트 설정</div>

        <div class="form-group">
          <label for="cfgSystemPreamble">시스템 프리앰블 <span class="tooltip" title="AI의 기본 역할을 정의하는 시스템 프롬프트 첫 부분. 모든 게임 세션에 적용됩니다.">ⓘ</span></label>
          <textarea id="cfgSystemPreamble" rows="5"></textarea>
        </div>

        <div class="form-group">
          <label for="cfgLatexRules">LaTeX 규칙 <span class="tooltip" title="LaTeX 활성화 시 AI에게 전달되는 대사/효과 연출 문법 규칙.">ⓘ</span></label>
          <textarea id="cfgLatexRules" rows="8"></textarea>
        </div>

        <div class="form-group">
          <label for="cfgNarrativeTemplate">서술 길이 템플릿 <span class="tooltip" title="서술 문단 수를 강제하는 프롬프트 템플릿. {nl}은 실제 문단 수로 치환됩니다.">ⓘ</span></label>
          <textarea id="cfgNarrativeTemplate" rows="5"></textarea>
        </div>

        <div class="form-group">
          <label for="cfgSummaryInstruction">요약 시스템 인스트럭션 <span class="tooltip" title="이야기 요약 생성 시 AI에게 전달되는 시스템 인스트럭션. {max_chars}는 요약 최대 글자수로 치환됩니다.">ⓘ</span></label>
          <textarea id="cfgSummaryInstruction" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label for="cfgSummaryNew">첫 요약 프롬프트 <span class="tooltip" title="첫 요약 생성 시 사용되는 프롬프트.">ⓘ</span></label>
          <textarea id="cfgSummaryNew" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label for="cfgSummaryUpdate">요약 업데이트 프롬프트 <span class="tooltip" title="기존 요약 업데이트 시 사용되는 프롬프트. {summary}는 기존 요약 내용으로 치환됩니다.">ⓘ</span></label>
          <textarea id="cfgSummaryUpdate" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label for="cfgGameStartMsg">게임 시작 메시지 <span class="tooltip" title="게임 시작 시 AI에게 보내는 첫 메시지.">ⓘ</span></label>
          <input type="text" id="cfgGameStartMsg">
        </div>

        <div class="form-group">
          <label>안전 설정 <span class="tooltip" title="Gemini API의 콘텐츠 안전 필터 임계값.">ⓘ</span></label>
          <div class="safety-grid">
            <div class="safety-row">
              <span class="safety-label">성적 콘텐츠</span>
              <select id="cfgSafetySexual" class="safety-select"></select>
            </div>
            <div class="safety-row">
              <span class="safety-label">혐오 발언</span>
              <select id="cfgSafetyHate" class="safety-select"></select>
            </div>
            <div class="safety-row">
              <span class="safety-label">괴롭힘</span>
              <select id="cfgSafetyHarassment" class="safety-select"></select>
            </div>
            <div class="safety-row">
              <span class="safety-label">위험 콘텐츠</span>
              <select id="cfgSafetyDangerous" class="safety-select"></select>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="cfgCacheTtl">캐시 TTL <span class="tooltip" title="Gemini Context Cache 유지 시간.">ⓘ</span></label>
          <input type="text" id="cfgCacheTtl" placeholder="3600s">
        </div>
      </div>

      <!-- 게임 파라미터 -->
      <div class="form-section" style="margin-bottom: 20px;">
        <div class="form-section-title">게임 파라미터</div>

        <div class="form-group">
          <label for="cfgDefaultNarrLen">기본 서술 문단 수 <span class="tooltip" title="새 게임 시작 시 기본 서술 문단 수">ⓘ</span></label>
          <input type="number" id="cfgDefaultNarrLen" min="1">
        </div>

        <div class="form-group">
          <label for="cfgNarrMin">서술 문단 수 최솟값 <span class="tooltip" title="사용자가 설정할 수 있는 서술 문단 수 하한">ⓘ</span></label>
          <input type="number" id="cfgNarrMin" min="1">
        </div>

        <div class="form-group">
          <label for="cfgNarrMax">서술 문단 수 최댓값 <span class="tooltip" title="사용자가 설정할 수 있는 서술 문단 수 상한">ⓘ</span></label>
          <input type="number" id="cfgNarrMax" min="1">
        </div>

        <div class="form-group">
          <label for="cfgSlidingWindow">슬라이딩 윈도우 크기 <span class="tooltip" title="API에 전송하는 최근 대화 메시지 수. 초과하면 요약으로 대체됩니다.">ⓘ</span></label>
          <input type="number" id="cfgSlidingWindow" min="1">
        </div>

        <div class="form-group">
          <label for="cfgMaxHistory">최대 히스토리 수 <span class="tooltip" title="에디터 미리보기에서 유지하는 최대 대화 메시지 수">ⓘ</span></label>
          <input type="number" id="cfgMaxHistory" min="1">
        </div>

        <div class="form-group">
          <label for="cfgMsgLimit">메시지 한도 <span class="tooltip" title="한 세션에서 허용되는 최대 메시지 수.">ⓘ</span></label>
          <input type="number" id="cfgMsgLimit" min="1">
        </div>

        <div class="form-group">
          <label for="cfgMsgWarning">메시지 경고 임계값 <span class="tooltip" title="메시지 한도 접근 시 경고를 표시하는 기준">ⓘ</span></label>
          <input type="number" id="cfgMsgWarning" min="1">
        </div>

        <div class="form-group">
          <label for="cfgSummaryOffset">요약 트리거 오프셋 <span class="tooltip" title="슬라이딩 윈도우 + 이 값 초과 시 자동 요약 생성">ⓘ</span></label>
          <input type="number" id="cfgSummaryOffset" min="1">
        </div>

        <div class="form-group">
          <label for="cfgSummaryMaxChars">요약 최대 글자수 <span class="tooltip" title="AI가 생성하는 요약의 최대 글자수">ⓘ</span></label>
          <input type="number" id="cfgSummaryMaxChars" min="1">
        </div>

        <div class="form-group">
          <label for="cfgAutoSaveMs">자동저장 주기 (ms) <span class="tooltip" title="클라우드 자동저장 주기 (ms). 300000 = 5분">ⓘ</span></label>
          <input type="number" id="cfgAutoSaveMs" min="1000" step="1000">
        </div>

        <div class="form-group">
          <label for="cfgMaxSessions">최대 세션 수 <span class="tooltip" title="로컬에 유지하는 최대 세션 수">ⓘ</span></label>
          <input type="number" id="cfgMaxSessions" min="1">
        </div>
      </div>

      <button class="btn btn-primary" id="btnSaveConfig">설정 저장</button>

    </div><!-- /tabConfig -->

  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script type="module" src="./js/app-admin.js"></script>
</body>
</html>
