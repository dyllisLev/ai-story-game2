name: CI - Develop Branch

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: cd packages/shared && npx tsc

      - name: Run tests
        run: pnpm --filter backend test:run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: |
          pnpm --filter @story-game/shared build
          rm -f packages/shared/tsconfig.tsbuildinfo
          ls -la packages/shared/dist/

      - name: Build frontend
        run: cd frontend && pnpm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Build backend
        run: cd backend && npx tsc
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_KEY_ENCRYPTION_SECRET: ${{ secrets.API_KEY_ENCRYPTION_SECRET }}

  notify-failure:
    name: Notify CI Failure
    needs: [test, build]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Paperclip - CI build failed
        run: |
          curl -sS -X POST \
            'https://paperclip.nuc.hmini.me/api/routine-triggers/public/4ae73abca93b80c62cc1e231/fire' \
            -H 'Authorization: Bearer ${{ secrets.PAPERCLIP_CI_WEBHOOK_SECRET }}' \
            -H 'Content-Type: application/json' \
            -d "{\"branch\": \"${{ github.ref_name }}\", \"commit\": \"${{ github.sha }}\", \"actor\": \"${{ github.actor }}\", \"runUrl\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
