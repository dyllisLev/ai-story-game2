name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: cd packages/shared && npx tsc

      - name: Run tests
        run: pnpm --filter backend test:run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: cd packages/shared && npx tsc

      - name: Build frontend
        run: cd frontend && pnpm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Build backend
        run: cd backend && pnpm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_KEY_ENCRYPTION_SECRET: ${{ secrets.API_KEY_ENCRYPTION_SECRET }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            frontend/dist/
            backend/dist/
          retention-days: 7

  deploy:
    name: Deploy
    needs: build
    runs-on: self-hosted
    environment:
      name: production
      url: https://aistorygame.nuc.hmini.me
    steps:
      - name: Deploy to production server
        run: |
          # SSH directly to production server (self-hosted runner has internal network access)
          ssh -o StrictHostKeyChecking=no root@10.0.0.17 '
            cd /root/ai-story-game2
            echo "Starting deployment..."
            ./deploy.sh
          '

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."

          # 헬스체크 재시도 설정
          MAX_RETRIES=10
          RETRY_INTERVAL=3
          RETRY_COUNT=0

          while [[ $RETRY_COUNT -lt $MAX_RETRIES ]]; do
            echo "헬스체크 시도 $((RETRY_COUNT + 1))/$MAX_RETRIES..."

            # Backend health check
            if curl -f --max-time 5 ${{ secrets.PRODUCTION_URL }}/api/health > /dev/null 2>&1; then
              echo "✅ Backend health check passed"
              BACKEND_OK=true
            else
              echo "❌ Backend health check failed"
              BACKEND_OK=false
            fi

            # Frontend health check
            if curl -f --max-time 5 ${{ secrets.PRODUCTION_URL }}/ > /dev/null 2>&1; then
              echo "✅ Frontend health check passed"
              FRONTEND_OK=true
            else
              echo "❌ Frontend health check failed"
              FRONTEND_OK=false
            fi

            # 둘 다 성공하면 종료
            if [[ "$BACKEND_OK" == "true" && "$FRONTEND_OK" == "true" ]]; then
              echo "✅ 모든 헬스체크 통과!"
              echo "Deployment verification complete!"
              exit 0
            fi

            # 재시도
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [[ $RETRY_COUNT -lt $MAX_RETRIES ]]; then
              echo "${RETRY_INTERVAL}초 후 재시도..."
              sleep $RETRY_INTERVAL
            fi
          done

          # 모든 재시도 실패
          echo "❌ 헬스체크 실패! ${MAX_RETRIES}회 시도 후에도 통과하지 못했습니다."
          exit 1

      - name: Notify deployment success
        if: success()
        run: echo "Deployment successful!"

      - name: Notify deployment failure
        if: failure()
        run: echo "Deployment failed! Check logs for details."
